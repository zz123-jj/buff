# ======================================================================
# 能量机关自瞄系统参数配置文件
# 用于 buff_detector、buff_estimator、buff_aimer 三个节点
# ======================================================================

# -------------------- 检测节点 (buff_detector) --------------------
buff_detector_node:
  ros__parameters:
      model_path: model/yolo11_buff_int8.xml
      openvino_device: GPU
      use_cuda: false
      confidence_threshold: 0.70
      iou_threshold: 0.5
      debug_mode: true
      image_reliable: true
      inside_shade_rate: 0.7
      outside_shade_rate: 1.39
      hsv_limits:
        lower: [0, 40, 220]
        upper: [70, 255, 255]
      dilate_kernel_size: 7
      max_lost_frame: 10




# -------------------- 状态估计节点 (buff_estimator) --------------------
buff_estimator_node:
  ros__parameters:
    target_frame: odom
    camera_frame: camera_optical_frame
    debug_mode: true
    debug_csv_path: buff_estimator_debug.csv
    physical_arm_length: 0.75
    velocity_median_window: 3
    radius_mean_window: 15
    fit_window_sec: 1.5
    fit_min_samples: 10
    fit_offset_sum: 2.090
    
    fit_a_range: [0.780, 1.045]
    fit_omega_range: [1.884, 2.000]
    fit_phi_range: [-3.141592653589793, 3.141592653589793]




# -------------------- 自瞄输出节点 (buff_aimer) --------------------
buff_aimer_node:
  ros__parameters:
    ballistic:
      bullet_speed: 23.8
      shoot_delay: 0.05
      gravity: 9.81
      air_k: 0.019
      converge_thresh: 0.002
      sim_dt: 0.005
    aiming:
      debug: true
    gimbal:
      command_limit: 0.1
      yaw_command_rate_limit: 0.8
      pitch_command_rate_limit: 0.8
      require_joint_states: false
      # 限制参与导数计算的最大 dt，避免长时间断流后第一帧跳太大（秒）
      max_command_dt: 0.001
    frames:
      target: "odom"
    physical_radius: 0.75
